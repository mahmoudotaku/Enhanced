build:
  docker:
    web: Dockerfile
  config:
    STACK: heroku-20
setup:
  addons:
    - plan: heroku-postgresql:essential-0
  config:
    FLASK_ENV: production
    SESSION_SECRET: 
      generator: secret
run:
  web: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 main:app
release:
  image: web
  command:
    - python -c "from app import app, db; app.app_context().push(); db.create_all()"